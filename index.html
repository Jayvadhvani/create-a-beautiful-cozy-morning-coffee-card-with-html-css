  <title>Create a Beautiful Cozy Morning Coffee Card with HTML &amp; CSS</title>
  <style>
    body { background: #faf5ff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0;}
    .card { width: 300px; height: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.4s ease;}
    .card:hover { transform: translateY(-10px) rotate(2deg); }
    
    .cup { width: 100px; height: 80px; background: #e2e8f0; border-radius: 5px 5px 40px 40px; position: relative; border: 4px solid #cbd5e1; z-index: 2;}
    .cup::after { content: ''; position: absolute; right: -30px; top: 10px; width: 30px; height: 40px; border: 4px solid #cbd5e1; border-left: none; border-radius: 0 20px 20px 0;}
    
    .steam-box { position: absolute; top: 80px; width: 80px; height: 100px; display: flex; justify-content: space-around; z-index: 1;}
    .steam { width: 15px; height: 15px; background: rgba(251, 146, 60, 0.5); filter: blur(8px); border-radius: 50%; opacity: 0; animation: floatUp 3s infinite ease-in; transition: background 0.4s;}
    .steam:nth-child(2) { animation-delay: 0.5s; width: 20px; }
    .steam:nth-child(3) { animation-delay: 1.2s; width: 10px; }
    
    .card:hover .steam { background: rgba(244, 63, 94, 0.5); }
    
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-80px) scale(3); opacity: 0; } }
    
    .quote { margin-top: 40px; text-align: center; color: #475569; font-style: italic; opacity: 0; transition: opacity 0.5s; }
    .card:hover .quote { opacity: 1; }
  </style>
